{% extends "reusable/base.html"%}
{% load static %}
{% block content %}
<h2>My Orders</h2>

<table border="1" width="100%">
    <tr>
        <th>Order ID</th>
        <th>Date</th>
        <th>Total</th>
        <th>Status</th>
        <th>Details</th>
    </tr>

    {% for order in orders %}
    <tr>
        <td>{{ order.id }}</td>
        <td>{{ order.created_at }}</td>
        <td>$ {{ order.total_amount }}</td>
        <td>{{ order.status }}</td>
        <td>
            <a href="{% url 'order_detail' order.id %}">View</a>
        </td>
    </tr>
    {% endfor %}

{% endblock %}

{% include "reusable/footer.html" %}
